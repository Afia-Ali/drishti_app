name: drishti_app
description: "Drishti - Vision assistant for visually impaired users."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Camera + ML
  camera: ^0.11.0+2
  tflite_flutter: ^0.12.1
  image: ^4.2.0

  # TTS
  flutter_tts: ^4.2.0

  # Bangla TTS via cloud
  audioplayers: ^6.1.0
  http: ^1.2.0

  # Permissions
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.0
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/images/